<!DOCTYPE html>
<html>
<head>
<title>Processing Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow text-center max-w-md">
  <h1 class="text-2xl font-bold text-blue-700 mb-4">
    Confirming your payment...
  </h1>

  <p class="text-gray-600 mb-6">
    Please wait while we confirm your transaction.  
    This usually takes a few seconds.
  </p>

  <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mx-auto"></div>

  <p class="text-sm text-gray-400 mt-6">
    Do not close this page.
  </p>
</div>

<script>
const email = localStorage.getItem("fsi_application_email");

async function checkStatus(){
  const res = await fetch("https://fsi.onrender.com/api/check-status/"+email);
  const data = await res.json();

  if(data.status === "paid"){
    localStorage.removeItem("fsi_application_email");
    window.location.href="https://fsi.onrender.com/success";
  }
}

// check every 4 seconds
setInterval(checkStatus, 4000);
</script>

</body>
</html>
