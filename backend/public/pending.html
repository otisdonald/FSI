<!DOCTYPE html>
<html>
<head>
  <title>Confirming Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

  <div class="bg-white p-10 rounded-xl shadow text-center max-w-md">
    <h1 class="text-2xl font-bold text-blue-700 mb-4">
      Confirming your payment…
    </h1>

    <p class="text-gray-600 mb-6">
      Please wait while we confirm your transaction.  
      This usually takes a few seconds.
    </p>

    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700 mx-auto"></div>

    <p id="statusText" class="mt-6 text-sm text-gray-500"></p>
  </div>

<script>

// get email from localStorage (saved before payment)
const appData = JSON.parse(localStorage.getItem("fsi_application"));
const email = appData?.email;

if(!email){
  document.getElementById("statusText").innerText = "Application not found.";
}

// check payment every 3 seconds
setInterval(async () => {
  try {
    const res = await fetch(`https://fsi.onrender.com/api/check-status/${email}`);
    const data = await res.json();

    if(data.status === "paid"){
      window.location.href = "https://fsi.netlify.app/success.html";
    }

  } catch(err){
    console.log(err);
  }
}, 3000);

</script>
</body>
</html>
