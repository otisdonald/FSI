<!DOCTYPE html>
<html>
<head>
  <title>Confirming Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

  <div class="bg-white p-10 rounded-xl shadow text-center max-w-md">
    <h1 class="text-2xl font-bold text-blue-700 mb-4">
      Confirming your payment…
    </h1>

    <p class="text-gray-600 mb-6">
      Please wait while we confirm your transaction.  
      This usually takes a few seconds.
    </p>

    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700 mx-auto"></div>

    <p id="statusText" class="mt-6 text-sm text-gray-500"></p>
  </div>

<script>

// ⭐ GET EMAIL FROM URL OR LOCAL STORAGE
const params = new URLSearchParams(window.location.search);
let email = params.get("email");

// fallback to localStorage
if(!email){
  email = localStorage.getItem("fsi_email");
}

const statusText = document.getElementById("statusText");

if(!email){
  statusText.innerText = "Application not found. Please apply again.";
}

// ⭐ POLL SERVER EVERY 3 SECONDS
const interval = setInterval(async () => {
  try {
    const res = await fetch(`https://fsi.onrender.com/api/check-status/${email}`);
    const data = await res.json();

    console.log("Checking payment:", data.status);

    if(data.status === "paid"){
      clearInterval(interval);

      statusText.innerText = "Payment confirmed! Redirecting...";

      setTimeout(()=>{
        window.location.href = "https://fsi.netlify.app/success.html";
      },1500);
    }

    if(data.status === "not_found"){
      statusText.innerText = "Waiting for payment confirmation...";
    }

  } catch(err){
    console.log(err);
    statusText.innerText = "Still confirming payment...";
  }
}, 3000);

</script>
</body>
</html>
