<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  font-family: system-ui;
}
.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="card w-full max-w-md">

<h1 class="text-2xl font-bold text-center">Admin Login</h1>
<p class="text-center text-gray-500 mt-1">Founders Support Initiative</p>

<form id="loginForm" class="mt-6 space-y-4">

<input type="email" id="email" placeholder="Email"
class="w-full border p-3 rounded">

<input type="password" id="password" placeholder="Password"
class="w-full border p-3 rounded">

<button type="submit"
class="w-full bg-blue-600 text-white p-3 rounded font-bold">
Login
</button>

</form>

<p id="error" class="text-red-500 text-center mt-3 hidden">
Invalid credentials
</p>

</div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/admin/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.success){
    localStorage.setItem("token", data.token);

    // redirect to dashboard
    window.location.href = "/admin";
  } else {
    document.getElementById("error").classList.remove("hidden");
  }

});

</script>

</body>
</html>
