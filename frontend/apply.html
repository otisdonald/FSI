<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply – Founders Support Initiative</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>
</head>

<body class="bg-gray-50 font-sans">

<!-- NAVBAR -->
<header class="sticky top-0 flex justify-between items-center px-6 py-4 bg-white/80 backdrop-blur-md shadow z-50">
 <h1 class="font-bold text-blue-700 text-lg">
  <a href="index.html" class="block">FSI</a>
 </h1>
  <nav class="hidden md:flex gap-6 text-sm font-medium">
    <a href="index.html">Home</a>
    <a href="programs.html">Programs</a>
    <a href="opportunities.html">Opportunities</a>
    <a href="learning.html">Learning Hub</a>
    <a href="community.html">Community</a>
    <a href="events.html">Events</a>
  </nav>
</header>

<!-- HERO -->
<section class="relative bg-blue-700 text-white py-28 text-center px-6 overflow-hidden">
  <div class="absolute inset-0">
    <img src="/images/apply.png" class="w-full h-full object-cover opacity-30" alt="Entrepreneurs">
  </div>
  <div class="relative z-10 max-w-3xl mx-auto">
    <p class="uppercase tracking-widest text-sm text-blue-200 mb-4">2026 Cohort — Founder Applications</p>
    <h1 class="text-4xl md:text-5xl font-bold leading-tight">Start Your Founder Application</h1>
    <p class="mt-6 text-lg text-gray-200">
      This application takes approximately <strong>10–15 minutes</strong> to complete.
    </p>
  </div>
</section>

<!-- FORM -->
<div class="max-w-2xl mx-auto p-6 mt-10">
<div class="bg-white p-8 rounded-xl shadow-lg border">
<h2 class="text-2xl font-bold text-blue-700 mb-6 text-center">Application Form</h2>

<form id="form" class="space-y-6">
  <input name="name" placeholder="Full Name" class="w-full border p-3 rounded mb-3" required>
  <input name="email" type="email" placeholder="Email" class="w-full border p-3 rounded mb-3" required>
  <input name="phone" placeholder="Phone" class="w-full border p-3 rounded mb-3" required>
  <input name="startup" placeholder="Startup Name" class="w-full border p-3 rounded mb-3" required>
  <textarea name="problem" placeholder="Problem you're solving" class="w-full border p-3 rounded mb-3" required></textarea>
  <textarea name="solution" placeholder="Your solution" class="w-full border p-3 rounded mb-3" required></textarea>
  <textarea name="business_model" placeholder="How you make money" class="w-full border p-3 rounded mb-3" required></textarea>
  <textarea name="usage" placeholder="How you will use funds" class="w-full border p-3 rounded mb-3" required></textarea>

  <div class="flex items-start gap-2">
    <input type="checkbox" id="agree" required>
    <label for="agree" class="text-sm">I confirm that the information provided is accurate and I agree to the Founder Agreement.</label>
  </div>

  <button type="button" onclick="submitForm()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">
    Submit Application (₦1,000)
  </button>
</form>
</div>
</div>

<script>
let FLW_PUBLIC_KEY="";

// fetch Flutterwave public key from server
fetch("https://fsi.onrender.com/api/config")
.then(res=>res.json())
.then(data=>FLW_PUBLIC_KEY=data.flutterwavePublicKey);

// 🚀 SUBMIT + PAY
async function submitForm(){
  const f=document.getElementById("form");

  if(!document.getElementById("agree").checked){
    alert("Please accept the agreement");
    return;
  }

  const data={
    name:f.name.value,
    email:f.email.value,
    phone:f.phone.value,
    startup:f.startup.value,
    problem:f.problem.value,
    solution:f.solution.value,
    business_model:f.business_model.value,
    usage:f.usage.value
  };

  try{
    // STEP 1 — SAVE APPLICATION FIRST
    const saveRes = await fetch("https://fsi.onrender.com/api/save-application",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(data)
    });

    const saveData = await saveRes.json();
    if(!saveData.success){
      alert("Could not save application. Try again.");
      return;
    }

    // STEP 2 — OPEN FLUTTERWAVE PAYMENT
    FlutterwaveCheckout({
      public_key: FLW_PUBLIC_KEY,
      tx_ref: "FSI-"+Date.now(),
      amount: 1000,
      currency: "NGN",
      payment_options: "card,banktransfer,ussd,account",
      customer:{
        email:data.email,
        name:data.name,
        phone_number:data.phone
      },
      customizations:{
        title:"Founders Support Initiative",
        description:"Application Fee"
      },
      // 🎉 PAYMENT SUCCESS → REDIRECT TO PENDING PAGE
      callback:function(response){
        localStorage.setItem("fsi_application", JSON.stringify(data));
        window.location.href="pending.html"; // relative path
      },
      onclose:function(){
        alert("Payment window closed.");
      }
    });

  }catch(err){
    alert("Server error. Please try again.");
    console.log(err);
  }
}
</script>
</body>
</html>
