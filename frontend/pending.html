<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pending – Founders Support Initiative</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

  <div class="text-center">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 mx-auto mb-6"></div>
    <h1 class="text-2xl font-bold text-blue-700 mb-4">Payment Pending</h1>
    <p class="text-gray-600">We’re waiting for confirmation of your payment. This may take a few seconds…</p>
  </div>

  <script>
    // Get applicant data from localStorage
    const appData = JSON.parse(localStorage.getItem("fsi_application"));
    if (!appData || !appData.email) {
      window.location.href = "failure.html";
    }

    let attempts = 0;
    const interval = setInterval(async () => {
      attempts++;
      try {
        const res = await fetch(`https://fsi.onrender.com/api/check-status/${appData.email}`);
        const data = await res.json();

        if (data.status === "paid") {
          clearInterval(interval);
          window.location.href = "success.html";
        } else if (data.status === "not_found" || data.status === "unpaid") {
          clearInterval(interval);
          window.location.href = "failure.html";
        }
      } catch (err) {
        console.error("Error checking status:", err);
      }

      // Timeout after ~60 seconds
      if (attempts > 20) {
        clearInterval(interval);
        window.location.href = "failure.html";
      }
    }, 3000);
  </script>

</body>
</html>
