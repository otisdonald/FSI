<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success – Founders Support Initiative</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

  <div class="bg-white p-10 rounded-xl shadow text-center max-w-md">
    <div class="text-green-600 text-6xl mb-4">✔</div>
    <h1 class="text-2xl font-bold text-green-700 mb-4">
      Payment Confirmed!
    </h1>

    <p class="text-gray-600 mb-2">
      Thank you for completing your application.
    </p>

    <!-- Personalized confirmation -->
    <p class="text-blue-700 font-semibold mb-6" id="userEmail"></p>

    <a href="index.html" 
       class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-bold">
      Back to Home
    </a>
  </div>

  <script>
    // Retrieve applicant data from localStorage
    const appData = JSON.parse(localStorage.getItem("fsi_application"));
    if (appData && appData.email) {
      document.getElementById("userEmail").innerText = 
        `Confirmation for: ${appData.email}`;
    }
  </script>

</body>
</html>
