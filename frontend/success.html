<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success – Founders Support Initiative</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Confetti animation */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: red;
      animation: fall 3s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-100vh) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

  <div class="bg-white p-10 rounded-xl shadow text-center max-w-md relative z-10">
    <div class="text-green-600 text-6xl mb-4">✔</div>
    <h1 class="text-2xl font-bold text-green-700 mb-4">Payment Confirmed!</h1>
    <p class="text-gray-600 mb-6">Your application fee has been received successfully. 🎉</p>
    <a href="index.html" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-bold">
      Back to Home
    </a>
  </div>

  <script>
    // Generate confetti pieces
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor = ["#f87171","#34d399","#60a5fa","#fbbf24"][Math.floor(Math.random()*4)];
      confetti.style.animationDuration = (Math.random()*3+2) + "s";
      document.body.appendChild(confetti);
    }
  </script>
</body>
</html>
